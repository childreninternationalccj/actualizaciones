<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actualización de Datos · CCJ 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f5f5;min-height:100vh;display:flex;justify-content:center;align-items:center}
.wrap{width:100%;max-width:480px;background:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px;text-align:center}
.icon{font-size:64px;margin-bottom:20px}
h1{font-size:22px;font-weight:900;color:#1d4ed8;margin-bottom:12px}
p{font-size:15px;color:#555;line-height:1.7;margin-bottom:8px}
.badge{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:12px;padding:16px 20px;margin-top:20px;font-size:14px;font-weight:700;color:#dc2626;line-height:1.8}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">🔒</div>
  <h1>Actualización cerrada</h1>
  <p>Por el momento no es posible actualizar datos.</p>
  <div class="badge">
    ⏳ Intente de nuevo<br>
    <strong>mañana o más tarde</strong><br><br>
    Disculpe los inconvenientes.
  </div>
</div>
</body>
</html>
